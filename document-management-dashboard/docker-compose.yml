version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: docuflow_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: document_dashboard
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d document_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docuflow_backend
    restart: always
    environment:
      PORT: 5001
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgrespassword@db:5432/document_dashboard?schema=public
      FRONTEND_URL: http://localhost:5173
    ports:
      - "5001:5001"
    volumes:
      - backend_uploads:/usr/src/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5001/api
        - VITE_SOCKET_URL=http://localhost:5001
    container_name: docuflow_frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
